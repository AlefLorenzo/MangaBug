# render.yaml — Blueprint para deploy automático no Render
# Importe este repo no Render Dashboard e ele configura tudo sozinho

services:
  # ─── BACKEND (API) ───
  - type: web
    name: mangabug-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mangabug
          property: connectionString
      - key: JWT_SECRET_USER
        generateValue: true
      - key: JWT_SECRET_ADMIN
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production

  # ─── FRONTEND (React SPA) ───
  - type: web
    name: mangabug-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: mangabug
    plan: free
    databaseName: mangabug
    user: mangabug_user
